services:
  tesla-invoice-fetcher:
    build: .
    image: ${TESLA_INVOICE_FETCHER_IMAGE:-tesla-invoice-fetcher:latest}
    container_name: tesla-invoice-fetcher
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/tesla-invoices.sqlite
      - INVOICE_STORAGE_DIR=/app/invoices
    volumes:
      - ./data:/app/data
      - ./invoices:/app/invoices
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

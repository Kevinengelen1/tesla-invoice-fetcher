<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Tesla Invoice Fetcher</title>
    <script>(function(){const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
    <style>
        :root {
            --red:    #e82127;
            --red-dk: #c01b21;
            --bg:     #f0f0f2;
            --card:   #ffffff;
            --border: #e5e7eb;
            --text:   #111827;
            --muted:  #6b7280;
            --light:  #9ca3af;
            --radius: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
        }
        [data-theme="dark"] {
            --bg:     #0d1117;
            --card:   #161b22;
            --border: #30363d;
            --text:   #e6edf3;
            --muted:  #8b949e;
            --light:  #6e7681;
            --shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: var(--bg); color: var(--text); min-height: 100vh;
               display: flex; flex-direction: column; }

        .topbar { background: #111; color: #fff; height: 54px; padding: 0 24px;
                  display: flex; align-items: center; gap: 14px; }
        [data-theme="dark"] .topbar { background: #010409; }
        .topbar-logo { width: 30px; height: 30px; background: var(--red); border-radius: 7px;
                       display: flex; align-items: center; justify-content: center;
                       font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0; text-decoration: none; }
        .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .card { background: var(--card); border-radius: var(--radius);
                box-shadow: var(--shadow); border: 1px solid var(--border);
                width: 100%; max-width: 440px; padding: 36px 32px; text-align: center; }

        .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-big  { width: 52px; height: 52px; background: var(--red); border-radius: 14px;
                     display: flex; align-items: center; justify-content: center;
                     font-size: 26px; font-weight: 900; color: #fff; }

        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .card-sub   { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

        .btn-login { display: inline-flex; align-items: center; justify-content: center; gap: 9px;
                     width: 100%; padding: 13px 20px; background: var(--red); color: #fff;
                     border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
                     cursor: pointer; text-decoration: none; transition: background .15s; }
        .btn-login:hover { background: var(--red-dk); }

        .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
                     padding: 14px 18px; margin-bottom: 24px; text-align: left; }
        [data-theme="dark"] .error-box { background: #2d0e0e; border-color: #5d1a1a; }
        .error-title { font-size: 13px; font-weight: 700; color: #991b1b; margin-bottom: 6px; }
        [data-theme="dark"] .error-title { color: #f85149; }
        .error-msg { font-size: 12px; color: #b91c1c; line-height: 1.5; }
        [data-theme="dark"] .error-msg { color: #fca5a5; }

        .footer { text-align: center; padding: 20px; font-size: 12px; color: var(--light); }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-logo">T</div>
    <span class="topbar-title">Invoice Fetcher</span>
</header>

<div class="main">
    <div class="card">
        <div class="logo-wrap"><div class="logo-big">T</div></div>
        <div class="card-title">Sign in</div>
        <div class="card-sub">You need to sign in to access Tesla Invoice Fetcher.</div>

        {% if title %}
        <div class="error-box">
            <div class="error-title">{{ title }}</div>
            {% if message %}<div class="error-msg">{{ message }}</div>{% endif %}
        </div>
        {% endif %}

        <a class="btn-login" href="/login">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign in with OIDC
        </a>
    </div>
</div>

<footer class="footer">Tesla Invoice Fetcher</footer>

</body>
</html>
